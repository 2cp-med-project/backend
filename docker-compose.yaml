services:
    backend-dev:
        build:
            context: .
            dockerfile: Dockerfile
            target: dev
        ports:
            - "5000:5000"
        environment:
            - REDIS_URL=redis://redis:6379
            - NODE_ENV=developement
        depends_on:
            - redis
        volumes:
            - .:/usr/src/app:z
            - /usr/src/app/node_modules

    backend-prod:
        build:
            context: .
            dockerfile: Dockerfile
            target: prod
        ports:
            - "5000:5000"
        environment:
            - REDIS_URL=redis://redis:6379
            - NODE_ENV=production
        depends_on:
            - redis

    redis:
        image: redis:alpine
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

volumes:
    redis_data:
