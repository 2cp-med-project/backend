<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Doctor Chat Tester</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>
    <body class="bg-gray-100 h-screen flex items-center justify-center">
        <div
            id="login-screen"
            class="bg-white p-8 rounded shadow-md text-center w-[500px]"
        >
            <h2 class="text-2xl font-bold mb-4">Doctor Registration / Login</h2>
            <p class="text-sm text-gray-500 mb-4">
                Enter an existing Username to log in, or fill all fields to
                create a new profile.
            </p>

            <div class="grid grid-cols-2 gap-4 mb-6 text-left text-sm">
                <input
                    type="text"
                    id="firstName"
                    placeholder="First Name"
                    class="border p-2 rounded"
                    required
                />
                <input
                    type="text"
                    id="lastName"
                    placeholder="Last Name"
                    class="border p-2 rounded"
                    required
                />

                <input
                    type="text"
                    id="userName"
                    placeholder="Username (Unique)"
                    class="border p-2 rounded"
                    required
                />
                <select id="gender" class="border p-2 rounded" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    class="border p-2 rounded"
                    required
                />
                <input
                    type="text"
                    id="phoneNumber"
                    placeholder="Phone Number"
                    class="border p-2 rounded"
                    required
                />

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    class="border p-2 rounded"
                    required
                />
                <input
                    type="text"
                    id="specialty"
                    placeholder="Specialty"
                    class="border p-2 rounded"
                    required
                />

                <input
                    type="text"
                    id="degreeId"
                    placeholder="Degree ID (Unique)"
                    class="border p-2 rounded col-span-2"
                    required
                />
            </div>

            <button
                onclick="identifyDoctor()"
                class="bg-blue-600 text-white px-4 py-2 rounded w-full font-bold"
            >
                Enter Platform
            </button>
        </div>

        <div
            id="app-screen"
            class="hidden w-full max-w-5xl h-[80vh] bg-white rounded shadow flex"
        >
            <div class="w-1/3 border-r bg-gray-50 flex flex-col">
                <div
                    class="p-4 bg-blue-600 text-white font-bold"
                    id="my-profile"
                >
                    Logged in as:
                </div>
                <div class="p-4 font-semibold border-b">Available Doctors</div>
                <div
                    id="doctor-list"
                    class="overflow-y-auto flex-1 p-2 space-y-2"
                ></div>
            </div>

            <div class="w-2/3 flex flex-col hidden" id="chat-area">
                <div class="p-4 border-b bg-gray-50 font-bold" id="chat-header">
                    Select a doctor to chat
                </div>

                <div
                    id="messages-container"
                    class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-100"
                ></div>

                <div class="p-4 border-t flex gap-2">
                    <input
                        type="text"
                        id="message-input"
                        placeholder="Type a message..."
                        class="flex-1 border p-2 rounded"
                    />
                    <button
                        onclick="sendMessage()"
                        class="bg-blue-600 text-white px-4 py-2 rounded"
                    >
                        Send
                    </button>
                </div>
            </div>
        </div>

        <script>
            const API_URL = "http://localhost:5000/api";
            const socket = io("http://localhost:5000");

            let currentUser = null;
            let currentRoomId = null;

            async function identifyDoctor() {
                const payload = {
                    firstName: document.getElementById("firstName").value,
                    lastName: document.getElementById("lastName").value,
                    userName: document.getElementById("userName").value,
                    gender: document.getElementById("gender").value,
                    email: document.getElementById("email").value,
                    phoneNumber: document.getElementById("phoneNumber").value,
                    password: document.getElementById("password").value,
                    specialty: document.getElementById("specialty").value,
                    degreeId: document.getElementById("degreeId").value,
                };

                if (!payload.userName || !payload.firstName) {
                    return alert(
                        "At minimum, First Name and Username are required!",
                    );
                }

                try {
                    const res = await axios.post(
                        `${API_URL}/users/doctors/identify`,
                        payload,
                    );

                    currentUser = res.data;

                    document
                        .getElementById("login-screen")
                        .classList.add("hidden");
                    document
                        .getElementById("app-screen")
                        .classList.remove("hidden");
                    document.getElementById("my-profile").innerText =
                        `Logged in as: Dr. ${currentUser.lastName} (${currentUser.specialty})`;

                    loadDoctors();
                } catch (error) {
                    console.error("Login failed", error);
                    alert(
                        error.response?.data?.message ||
                            "Login failed! Check console.",
                    );
                }
            }

            async function loadDoctors() {
                const res = await axios.get(`${API_URL}/users/doctors`);

                const doctors = res.data.filter(
                    (doc) => doc._id !== currentUser._id,
                );

                const listDiv = document.getElementById("doctor-list");
                listDiv.innerHTML = "";

                doctors.forEach((doc) => {
                    const btn = document.createElement("button");
                    btn.className =
                        "w-full text-left p-3 bg-white border rounded hover:bg-blue-50";
                    btn.innerText = doc.firstName;
                    btn.onclick = () => initiateChat(doc);
                    listDiv.appendChild(btn);
                });
            }

            async function initiateChat(targetDoctor) {
                document.getElementById("chat-area").classList.remove("hidden");
                document.getElementById("chat-header").innerText =
                    `Chatting with ${targetDoctor.firstName}`;
                document.getElementById("messages-container").innerHTML = "";

                try {
                    const res = await axios.post(`${API_URL}/chat/initiate`, {
                        currentUserId: currentUser._id,
                        targetUserId: targetDoctor._id,
                    });

                    // ADD THIS LINE BACK IN:
                    currentRoomId = res.data.roomId;

                    socket.emit("join", {
                        user: {
                            id: currentUser._id,
                            userName: currentUser.firstName,
                        },
                        roomId: currentRoomId,
                    });

                    const historyRes = await axios.get(
                        `${API_URL}/chat/messages/${currentRoomId}`,
                    );
                    historyRes.data.forEach((msg) => appendMessage(msg));
                } catch (error) {
                    console.error("Failed to initiate chat", error);
                }
            }

            function sendMessage() {
                const text = document.getElementById("message-input").value;
                if (!text || !currentRoomId) return;

                const messagePayload = {
                    roomId: currentRoomId,
                    senderId: currentUser._id,
                    senderName: currentUser.firstName,
                    text: text,
                };

                appendMessage(messagePayload);
                socket.emit("message", messagePayload);

                document.getElementById("message-input").value = "";
            }

            socket.on("message", (msg) => {
                if (msg.roomId === currentRoomId) {
                    appendMessage(msg);
                }
            });

            function appendMessage(msg) {
                const container = document.getElementById("messages-container");
                const div = document.createElement("div");

                const isMe = msg.senderId === currentUser._id;
                div.className = `p-3 rounded max-w-[70%] ${isMe ? "bg-blue-600 text-white ml-auto" : "bg-gray-300 text-black mr-auto"}`;
                div.innerHTML = `<div class="text-xs opacity-75 mb-1">${msg.senderName}</div><div>${msg.text}</div>`;

                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }
        </script>
    </body>
</html>
